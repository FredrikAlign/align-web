name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Inject the upload token into data/config.secret.js at deploy time.
      # ALIGN_UPLOAD_TOKEN is a fine-grained PAT stored as a repo secret
      # (Settings → Secrets → Actions). Only the admin sets this once.
      # The file is gitignored so the token never appears in the repo.
      - name: Inject upload token
        run: |
          cat > data/config.secret.js <<'JSEOF'
          window.ALIGN_SECRET = { githubToken: "${{ secrets.ALIGN_UPLOAD_TOKEN }}" };
          JSEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
